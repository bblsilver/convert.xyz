<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-card">
        <h1>Image Converter</h1>
        <p class="subtitle">Convert your images instantly</p>

        <!-- Unified Button Bar -->
        <div class="button-bar">
            <button class="choose-btn" onclick="document.getElementById('imageInput').click()">
                Choose Files
            </button>
            <div class="dropdown" onclick="toggleDropdown()">
                <div class="arrow" id="arrow">▼</div>
                <div class="dropdown-content" id="dropdownContent">
                    <div class="dropdown-item" onclick="selectFormat('to-jpg')">JPG</div>
                    <div class="dropdown-item" onclick="selectFormat('to-png')">PNG</div>
                    <div class="dropdown-item" onclick="selectFormat('to-webp')">WebP</div>
                    <div class="dropdown-item" onclick="selectFormat('to-gif')">GIF</div>
                    <div class="dropdown-item" onclick="selectFormat('to-bmp')">BMP</div>
                </div>
            </div>
        </div>

        <input type="file" id="imageInput" accept="image/*" hidden>
        <div id="statusText" class="status-text">Select a format from the arrow</div>

        <div id="previewContainer" class="preview-container" style="display:none;">
            <img id="imagePreview" src="" alt="Preview">
        </div>

        <button id="convertBtn" class="action-btn" onclick="convertImage()" style="display:none;">
            Convert Now
        </button>

        <a id="downloadLink" class="download-btn" style="display:none;">Download Image</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
