<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main-card">
        <h1>Image Converter</h1>
        <p class="subtitle">Convert your images instantly</p>

        <!-- Combined Upload and Dropdown Area -->
        <div class="upload-combo">
            <button class="choose-btn" onclick="document.getElementById('imageInput').click()">
                Choose Files
            </button>
            
            <div class="dropdown-wrapper">
                <select id="conversionType">
                    <option value="" disabled selected>Convert to...</option>
                    <option value="to-jpg">JPG</option>
                    <option value="to-png">PNG</option>
                    <option value="to-webp">WebP</option>
                    <option value="to-gif">GIF</option>
                    <option value="to-bmp">BMP</option>
                </select>
            </div>
        </div>

        <input type="file" id="imageInput" accept="image/*" hidden>
        <div id="fileInfo" class="file-info"></div>

        <div id="previewContainer" class=Copied!
